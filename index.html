<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<style>
  :root {
    --bg: #0e0f13;
    --panel: #16181f;
    --panel-2: #1c1f28;
    --text: #f4f4f6;
    --text-dim: #9497a6;
    --accent: #7c6cf0;
    --border: #262936;
    --online: #4fd67a;
    --idle: #f5b942;
    --dnd: #f0525b;
    --offline: #5b5e6b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: radial-gradient(circle at 30% 20%, #1a1c26, var(--bg) 60%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--text);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  #starfield {
    display: none;
  }

  .yt-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .yt-bg video {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
  }

  .yt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 11, 16, 0.55);
    z-index: 0;
    pointer-events: none;
  }

  .yt-loading-mask {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, #1a1c26, var(--bg) 60%);
    z-index: 0;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.5s ease;
  }

  .center-art {
    position: relative;
    width: 220px;
    height: 220px;
    max-width: 45vw;
    max-height: 45vw;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    z-index: 2;
    display: none;
    animation: breathe 3.2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .card {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 500px;
    width: 100%;
    z-index: 2;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    color: var(--text);
  }

  .card h1 {
    margin: 0 0 12px 0;
    font-size: 32px;
    font-weight: 700;
  }

  .card p {
    margin: 0 0 8px 0;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.5;
  }

  .card a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .card a:hover {
    text-decoration: underline;
  }

  .status-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  .status-dot.online {
    background-color: var(--online);
  }

  .status-dot.idle {
    background-color: var(--idle);
  }

  .status-dot.dnd {
    background-color: var(--dnd);
  }

  .status-dot.offline {
    background-color: var(--offline);
  }
</style>
</head>
<body>
<div class="yt-overlay"></div>
<div class="yt-loading-mask"></div>

<div class="card">
  <h1>👋 Hi, I'm Kartik</h1>
  <p><span class="status-dot online"></span>Online</p>
  <p>Welcome to my profile! I'm a developer passionate about creating amazing digital experiences.</p>
  <p>Feel free to <a href="https://github.com/kartuu07">check out my GitHub</a> or <a href="mailto:your.email@example.com">reach out to me</a>.</p>
</div>

</body>
</html>
