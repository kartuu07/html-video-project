<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<style>
  :root {
    --bg: #0e0f13;
    --panel: #16181f;
    --panel-2: #1c1f28;
    --text: #f4f4f6;
    --text-dim: #9497a6;
    --accent: #7c6cf0;
    --border: #262936;
    --online: #4fd67a;
    --idle: #f5b942;
    --dnd: #f0525b;
    --offline: #5b5e6b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: radial-gradient(circle at 30% 20%, #1a1c26, var(--bg) 60%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    color: var(--text);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  #starfield {
    display: none;
  }

  .yt-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    height: 56.25vw; /* 16:9 */
    min-height: 100vh;
    min-width: 177.78vh; /* 16:9 */
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .yt-bg video {
    width: 100%;
    height: 100%;
    border: none;
    object-fit: cover;
  }

  .yt-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 11, 16, 0.55);
    z-index: 0;
    pointer-events: none;
  }

  .yt-loading-mask {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, #1a1c26, var(--bg) 60%);
    z-index: 0;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.5s ease;
  }

  .center-art {
    position: relative;
    width: 220px;
    height: 220px;
    max-width: 45vw;
    max-height: 45vw;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    z-index: 2;
    display: none;
    animation: breathe 3.2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: transparent;
    border: none;
    border-radius: 20px;
    padding: 28px 26px 24px;
    position: relative;
    overflow: visible;
    z-index: 2;
    box-shadow: none;
  }

  .card::before {
    display: none;
  }



  .avatar-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 12px;
    z-index: 1;
  }

  .avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.15);
    object-fit: cover;
    background: transparent;
    display: block;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .status-dot {
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 4px solid var(--bg);
    background: var(--offline);
  }

  .status-dot.online { background: var(--online); }
  .status-dot.idle { background: var(--idle); }
  .status-dot.dnd { background: var(--dnd); }
  .status-dot.offline { background: var(--offline); }

  .identity {
    text-align: center;
    margin-bottom: 18px;
  }

  .typewriter-bio {
    font-size: 13px;
    color: var(--accent);
    min-height: 18px;
    margin: 8px 0 0;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  .tw-cursor {
    animation: blink 0.9s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .badges-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
  }

  .badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text-dim);
  }

  .view-counter {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin: -6px 0 4px;
  }

  .countdown-section {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin: 8px 0;
    padding: 10px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .countdown-label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    opacity: 0.7;
  }

  .countdown-timer {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .steam-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 14px 0;
    padding: 10px 16px;
    border-radius: 14px;
    background: linear-gradient(90deg, rgba(23, 26, 33, 0.85), rgba(38, 44, 56, 0.6));
    border: 1px solid rgba(255,255,255,0.1);
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s ease, border-color 0.2s ease;
  }

  .steam-row:hover {
    transform: translateY(-2px);
    border-color: rgba(102, 192, 244, 0.5);
  }

  .steam-row svg {
    flex-shrink: 0;
    color: #66c0f4;
  }

  .steam-text {
    display: flex;
    flex-direction: column;
    line-height: 1.3;
  }

  .steam-label {
    font-size: 13px;
    font-weight: 700;
  }

  .steam-sub {
    font-size: 11px;
    color: var(--text-dim);
  }

  .sound-toggle {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 5;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: rgba(20, 21, 28, 0.7);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .sound-toggle:hover {
    background: var(--accent);
    transform: scale(1.06);
  }

  .credit-text {
    position: fixed;
    bottom: 10px;
    right: 14px;
    z-index: 5;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.03em;
    pointer-events: none;
  }

  .preloader {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #05070d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.5s ease;
  }

  .preloader-spinner {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid rgba(120, 200, 255, 0.2);
    border-top-color: rgba(120, 200, 255, 0.9);
    animation: preloader-spin 0.9s linear infinite;
  }

  .preloader-text {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
  }

  @keyframes preloader-spin {
    to { transform: rotate(360deg); }
  }

  .intro-aura {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #05070d;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    pointer-events: none;
  }

  .intro-aura-waiting .aura-ring,
  .intro-aura-waiting .aura-flash {
    animation-play-state: paused !important;
  }

  .intro-aura.aura-start {
    animation: aura-fade-out 1.4s ease forwards;
    animation-delay: 4.8s;
  }

  .aura-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(120, 200, 255, 0.8);
    box-shadow: 0 0 60px 16px rgba(80, 170, 255, 0.7);
    opacity: 0;
  }

  .aura-ring-1 {
    width: 20px;
    height: 20px;
    animation: aura-charge 1.8s ease-in forwards, aura-expand 2.2s ease-out forwards 1.8s;
  }

  .aura-ring-2 {
    width: 20px;
    height: 20px;
    animation: aura-charge 1.8s ease-in forwards, aura-expand 2.2s ease-out forwards 2.05s;
  }

  .aura-ring-3 {
    width: 20px;
    height: 20px;
    animation: aura-charge 1.8s ease-in forwards, aura-expand 2.2s ease-out forwards 2.3s;
  }

  .aura-flash {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(150, 210, 255, 0.95), rgba(80, 150, 255, 0.25) 40%, transparent 70%);
    opacity: 0;
    animation: aura-flash-pulse 4.2s ease-out forwards;
  }

  @keyframes aura-charge {
    0% {
      width: 8px;
      height: 8px;
      opacity: 0;
      box-shadow: 0 0 10px 2px rgba(80, 170, 255, 0.3);
    }
    60% {
      opacity: 0.6;
    }
    100% {
      width: 30px;
      height: 30px;
      opacity: 1;
      box-shadow: 0 0 80px 24px rgba(100, 190, 255, 0.9);
    }
  }

  @keyframes aura-expand {
    0% {
      width: 30px;
      height: 30px;
      opacity: 0.9;
    }
    70% {
      opacity: 0.4;
    }
    100% {
      width: 1600px;
      height: 1600px;
      opacity: 0;
    }
  }

  @keyframes aura-flash-pulse {
    0% { opacity: 0; }
    45% { opacity: 0; }
    55% { opacity: 0.15; }
    75% { opacity: 1; }
    90% { opacity: 0.3; }
    100% { opacity: 0; }
  }

  @keyframes aura-fade-out {
    to {
      opacity: 0;
      visibility: hidden;
    }
  }

  .social-row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 12px 0 16px;
  }

  .social-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--text);
    box-shadow:
      inset 0 6px 10px rgba(255,255,255,0.35),
      inset 0 -8px 14px rgba(0,0,0,0.25),
      0 6px 14px rgba(0,0,0,0.3);
    position: relative;
    top: 0;
    overflow: hidden;
    animation: bubble-float 3.4s ease-in-out infinite;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.25s ease;
  }

  .social-icon::before {
    content: "";
    position: absolute;
    top: 8%;
    left: 18%;
    width: 40%;
    height: 30%;
    background: rgba(255,255,255,0.55);
    border-radius: 50%;
    filter: blur(3px);
    pointer-events: none;
  }

  .social-row a:nth-child(1) { animation-delay: 0s; }
  .social-row a:nth-child(2) { animation-delay: 0.4s; }
  .social-row a:nth-child(3) { animation-delay: 0.8s; }
  .social-row a:nth-child(4) { animation-delay: 1.2s; }

  @keyframes bubble-float {
    0%, 100% { top: 0; }
    50% { top: -6px; }
  }

  .social-icon:hover {
    transform: scale(1.35);
    box-shadow:
      inset 0 6px 10px rgba(255,255,255,0.45),
      inset 0 -8px 14px rgba(0,0,0,0.25),
      0 10px 22px rgba(0,0,0,0.4);
    z-index: 3;
    animation-play-state: paused;
  }

  .social-icon svg {
    color: #ffffff;
    position: relative;
    z-index: 1;
  }

  .discord-icon {
    background: #5865F2;
  }

  .instagram-icon {
    background: #c1387a;
  }

  .spotify-icon {
    background: #1DB954;
  }

  .youtube-icon {
    background: #d92c2c;
  }

  .big-name {
    font-size: 32px;
    font-weight: 800;
    text-align: center;
    margin: 0 0 16px;
    letter-spacing: 0.01em;
    text-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }

  .name {
    font-size: 19px;
    font-weight: 700;
    margin: 0 0 2px;
  }

  .username {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }

  .status-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 0;
    border-radius: 0;
    background: transparent;
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-label .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--offline);
  }
  .status-label .dot.online { background: var(--online); }
  .status-label .dot.idle { background: var(--idle); }
  .status-label .dot.dnd { background: var(--dnd); }

  .section {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 14px 0 0;
    margin-top: 12px;
    text-align: center;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin: 0 0 8px;
  }

  .activity {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: left;
  }

  .activity img {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: var(--panel);
    object-fit: cover;
  }

  .activity-text .a-name {
    font-size: 14px;
    font-weight: 600;
    margin: 0;
  }

  .activity-text .a-detail {
    font-size: 12px;
    color: var(--text-dim);
    margin: 2px 0 0;
  }

  .empty {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px 0;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 18px;
    opacity: 0.7;
  }

  .footer-note a { color: var(--accent); text-decoration: none; }

  .config-warning {
    background: #3a2a17;
    border: 1px solid #6b4a1f;
    color: #f5c884;
    font-size: 12px;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .config-warning code {
    background: rgba(0,0,0,0.25);
    padding: 1px 5px;
    border-radius: 4px;
  }
</style>
</head>

<script>
  // ---- Preloader: wait for video to be ready before playing the intro aura ----
  (function () {
    const preloader = document.getElementById('preloader');
    const aura = document.getElementById('introAura');
    const video = document.getElementById('bgVideo');
    let started = false;

    function startExperience() {
      if (started) return;
      started = true;
      preloader.style.opacity = '0';
      setTimeout(() => { preloader.style.display = 'none'; }, 500);
      aura.classList.remove('intro-aura-waiting');
      aura.classList.add('aura-start');
    }

    // Start once the video has enough data to play smoothly
    if (video.readyState >= 3) {
      startExperience();
    } else {
      video.addEventListener('canplaythrough', startExperience, { once: true });
    }
    // Safety fallback in case the video is slow or blocked
    setTimeout(startExperience, 4000);
  })();
  // ---- Background video volume control ----
  // Video starts muted (required by browsers for autoplay). The sound
  // toggle button lets the visitor turn it on/off explicitly.
  const VIDEO_VOLUME = 0.4; // 0 to 1, lower this to make it quieter
  const bgVideo = document.getElementById('bgVideo');
  let soundOn = false;

  bgVideo.volume = VIDEO_VOLUME;

  const loadingMask = document.getElementById('ytLoadingMask');
  bgVideo.addEventListener('playing', () => { loadingMask.style.opacity = '0'; });
  bgVideo.addEventListener('waiting', () => { loadingMask.style.opacity = '1'; });
  bgVideo.addEventListener('pause', () => { loadingMask.style.opacity = '1'; });

  const soundToggleBtn = document.getElementById('soundToggle');
  const iconOn = document.getElementById('soundIconOn');
  const iconOff = document.getElementById('soundIconOff');

  soundToggleBtn.addEventListener('click', function () {
    soundOn = !soundOn;
    if (soundOn) {
      bgVideo.muted = false;
      bgVideo.volume = VIDEO_VOLUME;
      iconOn.style.display = 'block';
      iconOff.style.display = 'none';
    } else {
      bgVideo.muted = true;
      iconOn.style.display = 'none';
      iconOff.style.display = 'block';
    }
  });

  // ---- Typewriter rotating bio text ----
  (function () {
    const phrases = ["Gamer", "Discord Mod", "Night Owl"];
    const el = document.getElementById('typewriterText');
    let phraseIndex = 0, charIndex = 0, deleting = false;

    function tick() {
      const current = phrases[phraseIndex];
      if (!deleting) {
        charIndex++;
        el.textContent = current.slice(0, charIndex);
        if (charIndex === current.length) {
          deleting = true;
          setTimeout(tick, 1400);
          return;
        }
      } else {
        charIndex--;
        el.textContent = current.slice(0, charIndex);
        if (charIndex === 0) {
          deleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
        }
      }
      setTimeout(tick, deleting ? 45 : 90);
    }
    tick();
  })();

  // ---- View counter with countdown to milestone ----
  (function () {
    const viewEl = document.getElementById('viewCounter');
    const countdownEl = document.getElementById('countdownTimer');
    const countdownSection = document.getElementById('countdownSection');
    const NAMESPACE = "kartuuxx-profile-8f3d";
    const KEY = "views";
    const MILESTONE = 1000; // Change this to your target view count

    fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}`)
      .then(res => res.json())
      .then(data => {
        const currentViews = data.value;
        viewEl.textContent = `${currentViews.toLocaleString()} views`;

        // Calculate remaining views to milestone
        const remaining = MILESTONE - currentViews;
        
        if (remaining > 0) {
          countdownSection.style.display = 'block';
          countdownEl.textContent = `${remaining.toLocaleString()} views remaining`;
        } else if (remaining === 0) {
          countdownSection.style.display = 'block';
          countdownEl.textContent = '🎉 Milestone reached!';
          countdownEl.style.color = '#4fd67a';
        } else {
          countdownSection.style.display = 'block';
          countdownEl.textContent = `${Math.abs(remaining).toLocaleString()} views past milestone`;
        }
      })
      .catch(() => {
        viewEl.textContent = '';
      });
  })();

  // ---- Fetch theme color from track cover art (image itself no longer shown) ----
  (function () {
    const TRACK_URL = "https://open.spotify.com/track/7etchTu0yJDGvk55gIQADV";
    fetch(`https://open.spotify.com/oembed?url=${encodeURIComponent(TRACK_URL)}`)
      .then(res => res.json())
      .then(data => {
        if (data.thumbnail_url) {
          extractThemeColor(data.thumbnail_url);
        }
      })
      .catch(() => {
        // If oEmbed fails, theming just stays at the default colors.
      });
  })();

  // ---- Extract a dominant color from the cover art and theme the page with it ----
  function extractThemeColor(imgUrl) {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = function () {
      try {
        const canvas = document.createElement('canvas');
        const size = 40;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const data = ctx.getImageData(0, 0, size, size).data;

        let r = 0, g = 0, b = 0, count = 0;
        for (let i = 0; i < data.length; i += 4) {
          const alpha = data[i + 3];
          if (alpha < 200) continue;
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
          count++;
        }
        if (count === 0) return;
        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);

        // Boost saturation a touch so muted covers still read as colorful
        const max = Math.max(r, g, b);
        const boost = max > 0 ? Math.min(1.4, 235 / max) : 1;
        r = Math.min(255, Math.round(r * boost));
        g = Math.min(255, Math.round(g * boost));
        b = Math.min(255, Math.round(b * boost));

        const accent = `rgb(${r}, ${g}, ${b})`;
        const glow = `rgba(${r}, ${g}, ${b}, 0.35)`;

        document.documentElement.style.setProperty('--accent', accent);
        const overlay = document.querySelector('.yt-overlay');
        if (overlay) {
          overlay.style.background =
            `radial-gradient(circle at 30% 20%, ${glow}, rgba(10,11,16,0.6) 65%)`;
        }
      } catch (e) {
        // Canvas may be tainted if the image host blocks CORS; theming is skipped silently.
      }
    };
    img.src = imgUrl;
  }

  // ---- Starfield background animation (disabled: replaced by YouTube video background) ----

    resize();

  // ==== CONFIGURE THIS ====
  const DISCORD_USER_ID = "1421713832363163799";
  // =========================

  const REFRESH_MS = 15000;

  const el = {
    avatar: document.getElementById('avatar'),
    statusDot: document.getElementById('statusDot'),
    displayName: document.getElementById('bigDisplayName'),
    username: document.getElementById('username'),
    statusLabelDot: document.getElementById('statusLabelDot'),
    statusText: document.getElementById('statusText'),
    activitySection: document.getElementById('activitySection'),
    activityBody: document.getElementById('activityBody'),
    warning: document.getElementById('warning'),
  };

  const STATUS_META = {
    online: { label: 'Online', cls: 'online' },
    idle: { label: 'Idle', cls: 'idle' },
    dnd: { label: 'Do not disturb', cls: 'dnd' },
    offline: { label: 'Offline', cls: 'offline' },
  };

  function showConfigWarning() {
    el.warning.innerHTML = `
      <div class="config-warning">
        Set your Discord user ID in the script — replace
        <code>REPLACE_WITH_YOUR_DISCORD_USER_ID</code> in index.html.
        You also need to join the
        <a href="https://discord.gg/lanyard" target="_blank" rel="noopener" style="color:#f5c884;">Lanyard</a>
        Discord server for live status to work.
      </div>`;
    el.displayName.textContent = "Set up required";
    el.username.textContent = "@configure-your-id";
  }

  function renderPresence(data) {
    const user = data.discord_user;
    const status = STATUS_META[data.discord_status] || STATUS_META.offline;

    el.avatar.src = user.avatar
      ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128`
      : `https://cdn.discordapp.com/embed/avatars/0.png`;

    el.displayName.textContent = user.global_name || user.username;
    el.username.textContent = '@' + user.username;

    el.statusDot.className = 'status-dot ' + status.cls;
    el.statusLabelDot.className = 'dot ' + status.cls;
    el.statusText.textContent = status.label;

    const activities = (data.activities || []).filter(a => a.type !== 4 || a.state);

    if (activities.length === 0) {
      el.activityBody.innerHTML = `<p class="empty">Not playing anything right now</p>`;
      el.activitySection.style.display = 'block';
    } else {
      const a = activities[0];
      let imgSrc = '';
      if (a.assets && a.assets.large_image) {
        const img = a.assets.large_image;
        if (img.startsWith('mp:')) {
          imgSrc = `https://media.discordapp.net/${img.replace('mp:', '')}`;
        }
      }

      const name = a.details || a.name || 'Something cool';
      const info = a.state || '';

      el.activityBody.innerHTML = imgSrc
        ? `<img src="${imgSrc}" alt="" />`
        : '';
      el.activityBody.innerHTML += `<div class="activity-text"><div class="a-name">${escapeHtml(name)}</div><div class="a-detail">${escapeHtml(info)}</div></div>`;
      el.activitySection.style.display = 'block';
    }
  }

  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, c => map[c]);
  }

  function fetchPresence() {
    if (!DISCORD_USER_ID) {
      showConfigWarning();
      return;
    }

    fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`)
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          renderPresence(data.data);
        }
      })
      .catch(() => {
        // Network error; activity will remain in its last state.
      });
  }

  // Fetch on page load and refresh every REFRESH_MS
  fetchPresence();
  setInterval(fetchPresence, REFRESH_MS);
</script>
